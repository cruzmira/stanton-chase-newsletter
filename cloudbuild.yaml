steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/cbre-newsletter-generator', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cbre-newsletter-generator']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cbre-newsletter-generator'
      - '--image'
      - 'gcr.io/$PROJECT_ID/cbre-newsletter-generator'
      - '--region'
      - '${_LOCATION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY}'
substitutions:
  _LOCATION: europe-west1
  _GEMINI_API_KEY: ''
images:
  - 'gcr.io/$PROJECT_ID/cbre-newsletter-generator'
